# Netlify configuration for Food Tracker
#
# Why these headers matter:
# - service-worker.js MUST never be cached by the browser/CDN, or you can't
#   ship updates (the user's browser would keep using the old SW forever).
# - HTML should also not be aggressively cached, so users get new SW
#   registration on next visit.
# - Static assets (CSS, JS) are referenced from HTML, so the SW versioning
#   strategy handles refresh; light caching is fine.

[build]
  publish = "."
  functions = "netlify/functions"

# Clean URLs for the auth + sync endpoints.
# status = 200 is a rewrite (internal), not an external redirect.
[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/day"
  to = "/.netlify/functions/day"
  status = 200

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
